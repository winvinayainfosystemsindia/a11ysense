# DEV Environment NGINX Config (WinVinaya Style)

server {
    listen 80;
    server_name dev-a11ysense.winvinaya.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dev-a11ysense.winvinaya.com;

    # SSL Configuration (Certbot pattern)
    ssl_certificate /etc/letsencrypt/live/dev-a11ysense.winvinaya.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-a11ysense.winvinaya.com/privkey.pem;
    
    # SSL optimizations
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Frontend Static Files
    location / {
        root /var/www/a11ysense-ai/dev/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Gateway API Proxy
    location /api/v1/gateway/ {
        rewrite ^/api/v1/gateway/(.*) /$1 break;
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Allure Reports (If hosted via NGINX)
    location /reports/ {
        alias /var/www/a11ysense-ai/dev/backend/storage/reports/allure-report/;
        index index.html;
    }
}
