# MAIN Environment NGINX Config (WinVinaya Style)

server {
    listen 80;
    server_name a11ysense.winvinaya.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name a11ysense.winvinaya.com;

    # SSL Configuration (Certbot pattern)
    ssl_certificate /etc/letsencrypt/live/a11ysense.winvinaya.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/a11ysense.winvinaya.com/privkey.pem;
    
    # SSL optimizations
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Frontend Static Files
    location / {
        root /var/www/a11ysense-ai/main/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Gateway API Proxy
    location /v1 {
        proxy_pass http://localhost:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
